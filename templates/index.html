<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .form-card, .results-card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .form-card h2, .results-card h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 15px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-danger {
            background: #dc3545;
        }
        
        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }
        
        .message.error {
            background: #f8d7da;
            border: 2px solid #f44336;
            color: #721c24;
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .stat-value {
            font-size: 24px;
            color: #333;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .students-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        
        .students-table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        
        .students-table td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .students-table tr:hover {
            background: #f5f5f5;
        }
        
        .no-data {
            text-align: center;
            color: #666;
            padding: 30px;
            font-style: italic;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .button-group button {
            flex: 1;
        }
        
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
            
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👨‍🎓 Student Information System</h1>
            <p>Manage and track student data efficiently</p>
        </div>
        
        <div class="content">
            <!-- Form Section -->
            <div class="form-card">
                <h2>Add Student Information</h2>
                
                <div id="formMessage" class="message"></div>
                
                <form id="studentForm">
                    <div class="form-group">
                        <label for="name">Student Name:</label>
                        <input type="text" id="name" name="name" placeholder="e.g., John Doe" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="age">Age:</label>
                        <input type="number" id="age" name="age" min="5" max="100" placeholder="e.g., 20" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="gender">Gender:</label>
                        <select id="gender" name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="student_id">Student ID:</label>
                        <input type="text" id="student_id" name="student_id" placeholder="e.g., STU001" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="marks">Marks (0-100):</label>
                        <input type="number" id="marks" name="marks" min="0" max="100" step="0.5" placeholder="e.g., 85.5" required>
                    </div>
                    
                    <button type="submit">Add Student</button>
                </form>
            </div>
            
            <!-- Results Section -->
            <div class="results-card">
                <h2>Student Summary</h2>
                
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-label">Total Students</div>
                        <div class="stat-value" id="totalStudents">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Average Age</div>
                        <div class="stat-value" id="avgAge">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Average Marks</div>
                        <div class="stat-value" id="avgMarks">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Highest Marks</div>
                        <div class="stat-value" id="highestMarks">-</div>
                    </div>
                </div>
                
                <div class="button-group">
                    <button class="btn-secondary" onclick="downloadCSV()">📥 Download CSV</button>
                    <button class="btn-danger" onclick="clearAllRecords()">🗑️ Clear All</button>
                </div>
            </div>
        </div>
        
        <!-- Students Table -->
        <div class="form-card">
            <h2>All Students</h2>
            <div id="studentsContainer">
                <div class="no-data">No students added yet. Fill the form to add students.</div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('studentForm');
        const formMessage = document.getElementById('formMessage');
        
        // Load students on page load
        window.addEventListener('load', loadStudents);
        
        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(form);
            
            try {
                const response = await fetch('/add_student', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage(data.message, 'success');
                    form.reset();
                    await loadStudents();
                } else {
                    showMessage(data.errors.join('<br>'), 'error');
                }
            } catch (error) {
                showMessage('Error adding student: ' + error.message, 'error');
            }
        });
        
        async function loadStudents() {
            try {
                const response = await fetch('/get_students');
                const data = await response.json();
                
                if (data.success) {
                    updateStats(data);
                    displayStudents(data.students, data.count);
                }
            } catch (error) {
                console.error('Error loading students:', error);
            }
        }
        
        function updateStats(data) {
            document.getElementById('totalStudents').textContent = data.count;
            
            if (data.stats) {
                document.getElementById('avgAge').textContent = data.stats.avg_age || '-';
                document.getElementById('avgMarks').textContent = data.stats.avg_marks || '-';
                document.getElementById('highestMarks').textContent = data.stats.highest_marks || '-';
            }
        }
        
        function displayStudents(students, count) {
            const container = document.getElementById('studentsContainer');
            
            if (count === 0) {
                container.innerHTML = '<div class="no-data">No students added yet. Fill the form to add students.</div>';
                return;
            }
            
            let html = '<table class="students-table"><thead><tr><th>Name</th><th>Age</th><th>Gender</th><th>Student ID</th><th>Marks</th></tr></thead><tbody>';
            
            students.forEach(student => {
                html += `<tr>
                    <td>${student.Name}</td>
                    <td>${student.Age}</td>
                    <td>${student.Gender}</td>
                    <td>${student['Student ID']}</td>
                    <td>${student.Marks}</td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function showMessage(msg, type) {
            formMessage.innerHTML = msg;
            formMessage.className = `message show ${type}`;
            setTimeout(() => {
                formMessage.classList.remove('show');
            }, 4000);
        }
        
        async function downloadCSV() {
            try {
                const response = await fetch('/download_csv');
                const data = await response.json();
                
                if (data.success) {
                    showMessage('✓ ' + data.message, 'success');
                } else {
                    showMessage('Error: ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('Error downloading CSV: ' + error.message, 'error');
            }
        }
        
        async function clearAllRecords() {
            if (confirm('Are you sure you want to clear all records? This cannot be undone.')) {
                try {
                    const response = await fetch('/clear_all', { method: 'POST' });
                    const data = await response.json();
                    
                    if (data.success) {
                        showMessage(data.message, 'success');
                        await loadStudents();
                    }
                } catch (error) {
                    showMessage('Error clearing records: ' + error.message, 'error');
                }
            }
        }
    </script>
</body>
</html>
